<!DOCTYPE html>
<html>
<head>
    <title>CampusConnect AI - Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/chatbot">Chatbot</a>
        <a href="/login">Admin login</a>
        <a href="/upload_pdf">Upload PDF</a>
    </nav>

    <div class="container">

        <h1>College Information Chatbot</h1>

        <p>Ask questions about admissions, fees, courses, placements, and more.</p>

        <form method="POST">

            <input
                type="text"
                name="question"
                placeholder="Type your question here..."
                required
            >

            <button type="submit">Send</button>

        </form>

        <br>

        {% if response %}
            <div class="response-box">
                <h3>Chatbot Response:</h3>
                <p>{{ response }}</p>
            </div>
        {% endif %}

    </div>
    
</body>
</html>
